name: Wisdom Digest

on:
  schedule:
    - cron: "0 20,21 * * *"
    - cron: "0 0,1 * * *"
    - cron: "0 5,6 * * *"
  workflow_dispatch:
    inputs:
      digest_slot:
        description: "Optional slot override: morning, noon, or evening"
        required: false
        type: string
      dry_run:
        description: "Render and process without sending email"
        required: true
        default: true
        type: boolean
      write_dry_run_logs:
        description: "Write dry-run delivery logs"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_WISDOM_DATABASE_ID: ${{ secrets.NOTION_WISDOM_DATABASE_ID }}
      NOTION_RECIPIENTS_DATABASE_ID: ${{ secrets.NOTION_RECIPIENTS_DATABASE_ID }}
      NOTION_DELIVERY_LOGS_DATABASE_ID: ${{ secrets.NOTION_DELIVERY_LOGS_DATABASE_ID }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      DEFAULT_TIMEZONE: Pacific/Auckland
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.dry_run) || 'true' }}
      WRITE_DRY_RUN_LOGS: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.write_dry_run_logs) || 'false' }}
      DIGEST_SLOT: ${{ github.event_name == 'workflow_dispatch' && inputs.digest_slot || '' }}
      LOG_LEVEL: INFO
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run tests
        run: uv run pytest

      - name: Run lint
        run: uv run ruff check .

      - name: Run digest
        run: uv run wisdom-digest
